<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔥 OCR Từ Ảnh - Web</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@v5/dist/tesseract.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #1e1e1e;
      color: #eee;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: #2a2a2a;
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 28px;
    }
    button {
      padding: 14px 20px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn-primary {
      background: #00cc88;
      color: white;
      width: 100%;
      margin-bottom: 20px;
    }
    .btn-primary:hover { background: #00b377; }
    
    .btn-secondary {
      background: #ff8800;
      color: white;
      width: 100%;
      margin-bottom: 20px;
    }
    .btn-secondary:hover { background: #dd6600; }
    
    .btn-row {
      display: flex;
      gap: 12px;
      margin-bottom: 15px;
    }
    .btn-row button {
      flex: 1;
      margin: 0;
    }
    
    .preview {
      border: 2px dashed #666;
      border-radius: 12px;
      min-height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #222;
      margin: 15px 0;
      overflow: hidden;
    }
    .preview img {
      max-width: 100%;
      max-height: 280px;
      object-fit: contain;
    }
    textarea {
      width: 100%;
      min-height: 220px;
      background: #1e1e1e;
      color: #fff;
      border: 1px solid #555;
      border-radius: 10px;
      padding: 15px;
      font-family: Consolas, monospace;
      font-size: 15px;
      resize: vertical;
    }
    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 15px;
    }
    .status {
      text-align: center;
      margin-top: 15px;
      padding: 10px;
      border-radius: 8px;
      font-weight: bold;
    }
    
    /* Screenshot overlay */
    #screenshotOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      cursor: crosshair;
    }
    
    #selectionCanvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10000;
      pointer-events: none;
    }
    
    .selection-info {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 10001;
      display: flex;
      gap: 15px;
      align-items: center;
    }
    
    .selection-info button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    
    .btn-capture {
      background: #00cc88;
      color: white;
    }
    
    .btn-cancel {
      background: #cc4444;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📸 OCR Nhận Diện Văn Bản Từ Ảnh</h1>
    
    <div class="btn-row">
      <button class="btn-primary" id="openBtn">📂 Mở Ảnh</button>
      <button class="btn-secondary" id="screenshotBtn">📸 Screenshot</button>
    </div>
    
    <p style="margin: 10px 0 5px 5px;">Ảnh Preview:</p>
    <div class="preview" id="preview">
      <span style="color:#888;">Chưa có ảnh nào</span>
    </div>

    <p style="margin: 15px 0 5px 5px;">📝 Kết quả nhận diện:</p>
    <textarea id="result" readonly placeholder="Kết quả OCR sẽ hiện ở đây..."></textarea>

    <div class="btn-group">
      <button style="flex:1; background:#0078d4; color:white;" id="copyBtn">📋 Copy Text</button>
      <button style="flex:1; background:#cc4444; color:white;" id="clearBtn">🗑️ Xóa</button>
    </div>

    <div class="status" id="status">Sẵn sàng - Nhấn nút để mở ảnh</div>
  </div>

  <input type="file" id="fileInput" accept="image/*" style="display:none">
  <canvas id="captureCanvas" style="display:none;"></canvas>
  <video id="captureVideo" style="display:none;" autoplay playsinline></video>
  
  <!-- Screenshot selection elements -->
  <div id="screenshotOverlay" style="display:none;"></div>
  <canvas id="selectionCanvas" style="display:none;"></canvas>
  <div class="selection-info" id="selectionInfo" style="display:none;">
    <span id="selectionText">Vùng: 0 x 0</span>
    <button class="btn-capture" id="btnCapture">📸 Chụp</button>
    <button class="btn-cancel" id="btnCancel">✖ Hủy</button>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const openBtn = document.getElementById('openBtn');
    const screenshotBtn = document.getElementById('screenshotBtn');
    const preview = document.getElementById('preview');
    const resultText = document.getElementById('result');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');
    const status = document.getElementById('status');
    const captureCanvas = document.getElementById('captureCanvas');
    const captureVideo = document.getElementById('captureVideo');
    
    // Selection elements
    const screenshotOverlay = document.getElementById('screenshotOverlay');
    const selectionCanvas = document.getElementById('selectionCanvas');
    const selectionInfo = document.getElementById('selectionInfo');
    const selectionText = document.getElementById('selectionText');
    const btnCapture = document.getElementById('btnCapture');
    const btnCancel = document.getElementById('btnCancel');

    let currentImageURL = null;
    let mediaStream = null;
    let screenshotBlob = null;
    let isSelecting = false;
    let startX = 0, startY = 0;
    let selX = 0, selY = 0, selW = 0, selH = 0;
    let selCtx = null;

    // Utility: Fix text - chỉ xuống dòng 1 lần như bình thường
    function fixText(text) {
      // Thay thế multiple spaces/tabs bằng 1 space
      // Thay thế 2+ newlines liên tiếp bằng 1 newline
      // Trim đầu và cuối
      return text
        .replace(/[ \t]+/g, ' ')           // multiple spaces/tabs → 1 space
        .replace(/\n{3,}/g, '\n\n')       // 3+ newlines → 2 newlines
        .replace(/ *\n */g, '\n')         // spaces trước/sau newline
        .trim();
    }

    openBtn.addEventListener('click', () => fileInput.click());

    // Screenshot functionality với region selection
    screenshotBtn.addEventListener('click', async () => {
      try {
        status.textContent = "📸 Đang mở dialog chọn màn hình...";
        status.style.color = "#ffcc00";
        
        // Yêu cầu quyền capture màn hình
        mediaStream = await navigator.mediaDevices.getDisplayMedia({
          video: { displaySurface: 'any' },
          audio: false
        });

        // Gán stream vào video element
        captureVideo.srcObject = mediaStream;
        captureVideo.style.display = 'block';
        
        // Đợi video load xong
        await new Promise(resolve => {
          captureVideo.onloadedmetadata = resolve;
        });
        
        // Hiện overlay để chọn vùng
        captureCanvas.width = captureVideo.videoWidth;
        captureCanvas.height = captureVideo.videoHeight;
        selectionCanvas.width = captureVideo.videoWidth;
        selectionCanvas.height = captureVideo.videoHeight;
        
        // Vẽ ảnh lên canvas
        selCtx = selectionCanvas.getContext('2d');
        selCtx.drawImage(captureVideo, 0, 0);
        
        // Hiện overlay và controls
        screenshotOverlay.style.display = 'block';
        selectionCanvas.style.display = 'block';
        selectionInfo.style.display = 'flex';
        
        // Setup selection events
        setupSelection();
        
        status.textContent = "🖱️ Kéo chọn vùng cần chụp";
        
      } catch (err) {
        console.error(err);
        if (err.name !== 'NotAllowedError') {
          status.textContent = "❌ Không thể capture màn hình";
          status.style.color = "#ff4444";
        } else {
          status.textContent = "Đã hủy capture";
          status.style.color = "#aaa";
        }
      }
    });

    function setupSelection() {
      selectionCanvas.style.pointerEvents = 'auto';
      
      selectionCanvas.onmousedown = (e) => {
        isSelecting = true;
        startX = e.clientX;
        startY = e.clientY;
        selX = startX;
        selY = startY;
        selW = 0;
        selH = 0;
      };
      
      selectionCanvas.onmousemove = (e) => {
        if (!isSelecting) return;
        
        selW = e.clientX - startX;
        selH = e.clientY - startY;
        selX = selW < 0 ? e.clientX : startX;
        selY = selH < 0 ? e.clientY : startY;
        selW = Math.abs(selW);
        selH = Math.abs(selH);
        
        // Redraw
        selCtx.clearRect(0, 0, selectionCanvas.width, selectionCanvas.height);
        selCtx.drawImage(captureVideo, 0, 0);
        
        // Vẽ vùng chọn
        if (selW > 0 && selH > 0) {
          // Darken outside
          selCtx.fillStyle = 'rgba(0, 0, 0, 0.5)';
          selCtx.fillRect(0, 0, selectionCanvas.width, selectionCanvas.height);
          
          // Clear selected area
          selCtx.clearRect(selX, selY, selW, selH);
          
          // Border
          selCtx.strokeStyle = '#00cc88';
          selCtx.lineWidth = 2;
          selCtx.strokeRect(selX, selY, selW, selH);
          
          // Corner handles
          const cs = 6;
          selCtx.fillStyle = '#00cc88';
          selCtx.fillRect(selX - cs/2, selY - cs/2, cs, cs);
          selCtx.fillRect(selX + selW - cs/2, selY - cs/2, cs, cs);
          selCtx.fillRect(selX - cs/2, selY + selH - cs/2, cs, cs);
          selCtx.fillRect(selX + selW - cs/2, selY + selH - cs/2, cs, cs);
        }
        
        selectionText.textContent = `Vùng: ${selW} x ${selH}`;
      };
      
      selectionCanvas.onmouseup = () => {
        isSelecting = false;
      };
    }

    // Cancel selection
    btnCancel.onclick = () => {
      cleanupSelection();
      status.textContent = "Đã hủy";
      status.style.color = "#aaa";
    };

    // Capture selected region
    btnCapture.onclick = async () => {
      if (selW < 10 || selH < 10) {
        status.textContent = "❌ Vùng chọn quá nhỏ";
        status.style.color = "#ff4444";
        return;
      }
      
      await captureSelectedRegion();
    };

    async function captureSelectedRegion() {
      try {
        status.textContent = "📸 Đang xử lý ảnh chụp...";
        status.style.color = "#ffcc00";
        
        // Crop ảnh từ canvas gốc
        const cropCanvas = document.createElement('canvas');
        cropCanvas.width = selW;
        cropCanvas.height = selH;
        const cropCtx = cropCanvas.getContext('2d');
        
        // Vẽ vùng đã chọn
        cropCtx.drawImage(captureVideo, selX, selY, selW, selH, 0, 0, selW, selH);
        
        // Chuyển thành Blob
        const blob = await new Promise(resolve => {
          cropCanvas.toBlob(resolve, 'image/png');
        });
        
        if (!blob) {
          status.textContent = "❌ Lỗi khi xử lý ảnh";
          status.style.color = "#ff4444";
          cleanupSelection();
          return;
        }
        
        screenshotBlob = blob;
        
        // Dừng stream
        if (mediaStream) {
          mediaStream.getTracks().forEach(track => track.stop());
          mediaStream = null;
        }
        
        cleanupSelection();
        
        // Preview ảnh
        if (currentImageURL) URL.revokeObjectURL(currentImageURL);
        currentImageURL = URL.createObjectURL(blob);
        preview.innerHTML = `<img src="${currentImageURL}" alt="screenshot">`;
        
        // OCR
        status.textContent = "🔍 Đang nhận diện text...";
        
        const file = new File([blob], 'screenshot.png', { type: 'image/png' });
        
        const { data: { text } } = await Tesseract.recognize(
          file,
          'vie+eng',
          {
            logger: m => {
              if (m.status === 'recognizing text') {
                status.textContent = `🔍 Đang nhận diện... ${Math.round(m.progress*100)}%`;
              }
            }
          }
        );
        
        // Sử dụng hàm fixText mới - chỉ xuống dòng 1 lần
        resultText.value = fixText(text) || "Không tìm thấy văn bản nào.";
        status.textContent = "✅ Hoàn thành";
        status.style.color = "#00dd88";
        
      } catch (err) {
        console.error(err);
        status.textContent = "❌ Lỗi khi xử lý OCR";
        status.style.color = "#ff4444";
        cleanupSelection();
      }
    }

    function cleanupSelection() {
      screenshotOverlay.style.display = 'none';
      selectionCanvas.style.display = 'none';
      selectionInfo.style.display = 'none';
      selectionCanvas.style.pointerEvents = 'none';
      isSelecting = false;
    }

    // File input handler
    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      status.textContent = "Đang xử lý...";
      status.style.color = "#ffcc00";

      currentImageURL = URL.createObjectURL(file);
      preview.innerHTML = `<img src="${currentImageURL}" alt="preview">`;

      try {
        const { data: { text } } = await Tesseract.recognize(
          file,
          'vie+eng',
          {
            logger: m => {
              if (m.status === 'recognizing text') {
                status.textContent = `Đang nhận diện... ${Math.round(m.progress*100)}%`;
              }
            }
          }
        );

        resultText.value = fixText(text) || "Không tìm thấy văn bản nào.";
        status.textContent = "✅ Hoàn thành";
        status.style.color = "#00dd88";
      } catch (err) {
        console.error(err);
        status.textContent = "❌ Lỗi khi xử lý OCR";
        status.style.color = "#ff4444";
      }
    });

    copyBtn.addEventListener('click', () => {
      const text = resultText.value.trim();
      if (text) {
        navigator.clipboard.writeText(text).then(() => {
          status.textContent = "✅ Đã copy vào clipboard!";
          status.style.color = "#00dd88";
        });
      }
    });

    clearBtn.addEventListener('click', () => {
      resultText.value = '';
      preview.innerHTML = '<span style="color:#888;">Chưa có ảnh nào</span>';
      if (currentImageURL) URL.revokeObjectURL(currentImageURL);
      currentImageURL = null;
      status.textContent = "Đã xóa tất cả";
      status.style.color = "#aaa";
    });
  </script>
</body>
</html>
