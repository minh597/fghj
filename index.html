<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔥 OCR Từ Ảnh - Web</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@v5/dist/tesseract.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #1e1e1e;
      color: #eee;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: #2a2a2a;
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 28px;
    }
    button {
      padding: 14px 20px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn-primary {
      background: #00cc88;
      color: white;
      width: 100%;
      margin-bottom: 20px;
    }
    .btn-primary:hover { background: #00b377; }
    
    .btn-secondary {
      background: #ff8800;
      color: white;
      width: 100%;
      margin-bottom: 20px;
    }
    .btn-secondary:hover { background: #dd6600; }
    
    .btn-row {
      display: flex;
      gap: 12px;
      margin-bottom: 15px;
    }
    .btn-row button {
      flex: 1;
      margin: 0;
    }
    
    .preview {
      border: 2px dashed #666;
      border-radius: 12px;
      min-height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #222;
      margin: 15px 0;
      overflow: hidden;
    }
    .preview img {
      max-width: 100%;
      max-height: 280px;
      object-fit: contain;
    }
    textarea {
      width: 100%;
      min-height: 220px;
      background: #1e1e1e;
      color: #fff;
      border: 1px solid #555;
      border-radius: 10px;
      padding: 15px;
      font-family: Consolas, monospace;
      font-size: 15px;
      resize: vertical;
    }
    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 15px;
    }
    .status {
      text-align: center;
      margin-top: 15px;
      padding: 10px;
      border-radius: 8px;
      font-weight: bold;
    }
    
    /* Crop overlay */
    #cropOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      display: none;
    }
    
    #cropCanvas {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 90%;
      max-height: 70%;
      z-index: 10000;
      cursor: crosshair;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }
    
    #cropSelectionCanvas {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10001;
      pointer-events: none;
    }
    
    .crop-info {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 10002;
      display: flex;
      gap: 15px;
      align-items: center;
    }
    
    .crop-info button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    
    .btn-crop {
      background: #00cc88;
      color: white;
    }
    
    .btn-cancel-crop {
      background: #cc4444;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📸 OCR Nhận Diện Văn Bản Từ Ảnh</h1>
    
    <div class="btn-row">
      <button class="btn-primary" id="openBtn">📂 Mở Ảnh</button>
      <button class="btn-secondary" id="screenshotBtn">📸 Screenshot</button>
    </div>
    
    <p style="margin: 10px 0 5px 5px;">Ảnh Preview:</p>
    <div class="preview" id="preview">
      <span style="color:#888;">Chưa có ảnh nào</span>
    </div>

    <p style="margin: 15px 0 5px 5px;">📝 Kết quả nhận diện:</p>
    <textarea id="result" readonly placeholder="Kết quả OCR sẽ hiện ở đây..."></textarea>

    <div class="btn-group">
      <button style="flex:1; background:#0078d4; color:white;" id="copyBtn">📋 Copy Text</button>
      <button style="flex:1; background:#cc4444; color:white;" id="clearBtn">🗑️ Xóa</button>
    </div>

    <div class="status" id="status">Sẵn sàng - Nhấn nút để mở ảnh</div>
  </div>

  <input type="file" id="fileInput" accept="image/*" style="display:none">
  <canvas id="captureCanvas" style="display:none;"></canvas>
  <video id="captureVideo" style="display:none;" autoplay playsinline></video>
  
  <!-- Crop selection elements -->
  <div id="cropOverlay"></div>
  <canvas id="cropCanvas"></canvas>
  <canvas id="cropSelectionCanvas"></canvas>
  <div class="crop-info" id="cropInfo" style="display:none;">
    <span id="cropText">Vùng: 0 x 0</span>
    <button class="btn-crop" id="btnCrop">✂️ Crop & OCR</button>
    <button class="btn-cancel-crop" id="btnCancelCrop">✖ Hủy</button>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const openBtn = document.getElementById('openBtn');
    const screenshotBtn = document.getElementById('screenshotBtn');
    const preview = document.getElementById('preview');
    const resultText = document.getElementById('result');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');
    const status = document.getElementById('status');
    const captureCanvas = document.getElementById('captureCanvas');
    const captureVideo = document.getElementById('captureVideo');
    
    // Crop elements
    const cropOverlay = document.getElementById('cropOverlay');
    const cropCanvas = document.getElementById('cropCanvas');
    const cropSelectionCanvas = document.getElementById('cropSelectionCanvas');
    const cropInfo = document.getElementById('cropInfo');
    const cropText = document.getElementById('cropText');
    const btnCrop = document.getElementById('btnCrop');
    const btnCancelCrop = document.getElementById('btnCancelCrop');

    let currentImageURL = null;
    let mediaStream = null;
    let screenshotBlob = null;
    let fullImageBitmap = null;
    
    // Crop selection state
    let isCropping = false;
    let cropStartX = 0, cropStartY = 0;
    let cropX = 0, cropY = 0, cropW = 0, cropH = 0;
    let cropCtx = null;
    let scaleX = 1, scaleY = 1;
    let canvasLeft = 0, canvasTop = 0;

    // Utility: Fix text - xóa dòng trắng và khoảng trắng thừa
    function fixText(text) {
      return text
        .replace(/\n\s*\n/g, '\n')         // xóa dòng trắng (dòng chỉ có space/tab)
        .replace(/\n{2,}/g, '\n')         // 2+ newlines → 1 newline
        .replace(/[ \t]+/g, ' ')           // multiple spaces/tabs → 1 space
        .trim();
    }

    openBtn.addEventListener('click', () => fileInput.click());

    // Screenshot - chụp full tab trước
    screenshotBtn.addEventListener('click', async () => {
      try {
        status.textContent = "📸 Đang mở dialog chọn màn hình...";
        status.style.color = "#ffcc00";
        
        mediaStream = await navigator.mediaDevices.getDisplayMedia({
          video: { displaySurface: 'any' },
          audio: false
        });

        captureVideo.srcObject = mediaStream;
        
        await new Promise(resolve => {
          captureVideo.onloadedmetadata = resolve;
        });
        
        // Chụp full frame vào canvas
        captureCanvas.width = captureVideo.videoWidth;
        captureCanvas.height = captureVideo.videoHeight;
        const ctx = captureCanvas.getContext('2d');
        ctx.drawImage(captureVideo, 0, 0);
        
        // Lưu blob
        screenshotBlob = await new Promise(resolve => {
          captureCanvas.toBlob(resolve, 'image/png');
        });
        
        // Dừng stream
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;
        captureVideo.style.display = 'none';
        
        if (!screenshotBlob) {
          status.textContent = "❌ Lỗi khi chụp màn hình";
          status.style.color = "#ff4444";
          return;
        }
        
        // Preview full ảnh
        if (currentImageURL) URL.revokeObjectURL(currentImageURL);
        currentImageURL = URL.createObjectURL(screenshotBlob);
        preview.innerHTML = `<img src="${currentImageURL}" alt="screenshot">`;
        
        // Mở crop overlay
        await openCropOverlay(screenshotBlob);
        
        status.textContent = "✂️ Kéo chọn vùng để crop hoặc nhấn 'Crop & OCR' để OCR toàn bộ";
        
      } catch (err) {
        console.error(err);
        if (err.name !== 'NotAllowedError') {
          status.textContent = "❌ Không thể capture màn hình";
          status.style.color = "#ff4444";
        } else {
          status.textContent = "Đã hủy capture";
          status.style.color = "#aaa";
        }
      }
    });

    async function openCropOverlay(blob) {
      // Load ảnh
      const img = new Image();
      img.src = URL.createObjectURL(blob);
      await new Promise(resolve => { img.onload = resolve; });
      
      // Setup canvas crop
      const maxW = window.innerWidth * 0.9;
      const maxH = window.innerHeight * 0.7;
      let w = img.width, h = img.height;
      
      if (w > maxW) {
        h = h * (maxW / w);
        w = maxW;
      }
      if (h > maxH) {
        w = w * (maxH / h);
        h = maxH;
      }
      
      cropCanvas.width = w;
      cropCanvas.height = h;
      cropSelectionCanvas.width = w;
      cropSelectionCanvas.height = h;
      
      const ctx = cropCanvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      
      // Tính scale để convert pixel khi crop
      scaleX = img.width / w;
      scaleY = img.height / h;
      
      // Lấy vị trí canvas trên màn hình
      const rect = cropCanvas.getBoundingClientRect();
      canvasLeft = rect.left;
      canvasTop = rect.top;
      
      // Setup selection
      cropCtx = cropSelectionCanvas.getContext('2d');
      cropSelectionCanvas.style.pointerEvents = 'none';
      
      // Hiện overlay
      cropOverlay.style.display = 'block';
      cropSelectionCanvas.style.display = 'block';
      cropInfo.style.display = 'flex';
      
      // Events
      cropCanvas.style.pointerEvents = 'auto';
      
      cropCanvas.onmousedown = (e) => {
        isCropping = true;
        cropStartX = e.clientX - canvasLeft;
        cropStartY = e.clientY - canvasTop;
        cropX = cropStartX;
        cropY = cropStartY;
        cropW = 0;
        cropH = 0;
        cropSelectionCanvas.style.pointerEvents = 'auto';
      };
      
      cropCanvas.onmousemove = (e) => {
        if (!isCropping) return;
        
        cropW = e.clientX - canvasLeft - cropStartX;
        cropH = e.clientY - canvasTop - cropStartY;
        cropX = cropW < 0 ? e.clientX - canvasLeft : cropStartX;
        cropY = cropH < 0 ? e.clientY - canvasTop : cropStartY;
        cropW = Math.abs(cropW);
        cropH = Math.abs(cropH);
        
        drawCropSelection();
      };
      
      cropCanvas.onmouseup = () => {
        isCropping = false;
        if (cropW > 5 && cropH > 5) {
          cropText.textContent = `Vùng: ${Math.round(cropW)} x ${Math.round(cropH)}`;
        }
      };
      
      cropCanvas.onmouseleave = () => {
        isCropping = false;
      };
    }

    function drawCropSelection() {
      cropCtx.clearRect(0, 0, cropSelectionCanvas.width, cropSelectionCanvas.height);
      
      if (cropW < 5 || cropH < 5) return;
      
      // Border
      cropCtx.strokeStyle = '#00cc88';
      cropCtx.lineWidth = 2;
      cropCtx.strokeRect(cropX, cropY, cropW, cropH);
      
      // Corner handles
      const cs = 6;
      cropCtx.fillStyle = '#00cc88';
      cropCtx.fillRect(cropX - cs/2, cropY - cs/2, cs, cs);
      cropCtx.fillRect(cropX + cropW - cs/2, cropY - cs/2, cs, cs);
      cropCtx.fillRect(cropX - cs/2, cropY + cropH - cs/2, cs, cs);
      cropCtx.fillRect(cropX + cropW - cs/2, cropY + cropH - cs/2, cs, cs);
      
      cropText.textContent = `Vùng: ${Math.round(cropW)} x ${Math.round(cropH)}`;
    }

    btnCancelCrop.onclick = () => {
      closeCropOverlay();
      status.textContent = "Đã hủy crop - Ảnh full vẫn ở preview";
      status.style.color = "#aaa";
    };

    btnCrop.onclick = async () => {
      if (cropW > 5 && cropH > 5) {
        // Crop vùng đã chọn
        await cropAndOCR();
      } else {
        // OCR toàn bộ ảnh
        await ocrFullImage();
      }
    };

    async function cropAndOCR() {
      try {
        status.textContent = "✂️ Đang crop vùng chọn...";
        status.style.color = "#ffcc00";
        
        // Crop từ ảnh gốc (screenshotBlob)
        const img = new Image();
        img.src = URL.createObjectURL(screenshotBlob);
        await new Promise(resolve => { img.onload = resolve; });
        
        const realX = Math.round(cropX * scaleX);
        const realY = Math.round(cropY * scaleY);
        const realW = Math.round(cropW * scaleX);
        const realH = Math.round(cropH * scaleY);
        
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = realW;
        tempCanvas.height = realH;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(img, realX, realY, realW, realH, 0, 0, realW, realH);
        
        const cropBlob = await new Promise(resolve => {
          tempCanvas.toBlob(resolve, 'image/png');
        });
        
        closeCropOverlay();
        
        // Preview vùng đã crop
        if (currentImageURL) URL.revokeObjectURL(currentImageURL);
        currentImageURL = URL.createObjectURL(cropBlob);
        preview.innerHTML = `<img src="${currentImageURL}" alt="cropped">`;
        
        await performOCR(cropBlob);
        
      } catch (err) {
        console.error(err);
        status.textContent = "❌ Lỗi khi crop ảnh";
        status.style.color = "#ff4444";
        closeCropOverlay();
      }
    }

    async function ocrFullImage() {
      closeCropOverlay();
      await performOCR(screenshotBlob);
    }

    async function performOCR(blob) {
      try {
        status.textContent = "🔍 Đang nhận diện text...";
        status.style.color = "#ffcc00";
        
        const file = new File([blob], 'ocr.png', { type: 'image/png' });
        
        const { data: { text } } = await Tesseract.recognize(
          file,
          'vie+eng',
          {
            logger: m => {
              if (m.status === 'recognizing text') {
                status.textContent = `🔍 Đang nhận diện... ${Math.round(m.progress*100)}%`;
              }
            }
          }
        );
        
        resultText.value = fixText(text) || "Không tìm thấy văn bản nào.";
        status.textContent = "✅ Hoàn thành";
        status.style.color = "#00dd88";
        
      } catch (err) {
        console.error(err);
        status.textContent = "❌ Lỗi khi xử lý OCR";
        status.style.color = "#ff4444";
      }
    }

    function closeCropOverlay() {
      cropOverlay.style.display = 'none';
      cropSelectionCanvas.style.display = 'none';
      cropInfo.style.display = 'none';
      cropCanvas.style.pointerEvents = 'none';
      cropSelectionCanvas.style.pointerEvents = 'none';
      isCropping = false;
      cropW = 0;
      cropH = 0;
      
      // Cleanup events
      cropCanvas.onmousedown = null;
      cropCanvas.onmousemove = null;
      cropCanvas.onmouseup = null;
      cropCanvas.onmouseleave = null;
    }

    // File input handler
    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      status.textContent = "Đang xử lý...";
      status.style.color = "#ffcc00";

      currentImageURL = URL.createObjectURL(file);
      preview.innerHTML = `<img src="${currentImageURL}" alt="preview">`;

      try {
        const { data: { text } } = await Tesseract.recognize(
          file,
          'vie+eng',
          {
            logger: m => {
              if (m.status === 'recognizing text') {
                status.textContent = `Đang nhận diện... ${Math.round(m.progress*100)}%`;
              }
            }
          }
        );

        resultText.value = fixText(text) || "Không tìm thấy văn bản nào.";
        status.textContent = "✅ Hoàn thành";
        status.style.color = "#00dd88";
      } catch (err) {
        console.error(err);
        status.textContent = "❌ Lỗi khi xử lý OCR";
        status.style.color = "#ff4444";
      }
    });

    copyBtn.addEventListener('click', () => {
      const text = resultText.value.trim();
      if (text) {
        navigator.clipboard.writeText(text).then(() => {
          status.textContent = "✅ Đã copy vào clipboard!";
          status.style.color = "#00dd88";
        });
      }
    });

    clearBtn.addEventListener('click', () => {
      resultText.value = '';
      preview.innerHTML = '<span style="color:#888;">Chưa có ảnh nào</span>';
      if (currentImageURL) URL.revokeObjectURL(currentImageURL);
      currentImageURL = null;
      status.textContent = "Đã xóa tất cả";
      status.style.color = "#aaa";
    });
  </script>
</body>
</html>
